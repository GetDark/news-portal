services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3006:3000"
    networks:
      - internal
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=https://news.swiftstream.ru
      - BACKEND_URL=http://backend:8000

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8006:8000"
    volumes:
      - uploads:/app/uploads
    env_file: .env
    networks:
      - shared_net
      - internal

networks:
  shared_net:
    external: true
  internal:

volumes:
  uploads:
